    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">Volunteer Connect</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent"
                    aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" aria-current="page" href="index.html">
                            <i class="fa-solid fa-house me-1"></i>Home
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" aria-current="page" href="opportunities.html">
                            <i class="fa-regular fa-lightbulb me-1"></i>Opportunities
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" aria-current="page" href="events.html">
                            <i class="fa-regular fa-calendar me-1"></i>Events
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" aria-current="page" href="contact.html">
                            <i class="fa-solid fa-phone-volume me-1"></i>Contact Us
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" aria-current="page" href="about.html">
                            <i class="fa-solid fa-circle-info me-1"></i>About

                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown"
                           aria-expanded="false">
                            More
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="privacy-policy.html">Privacy Policy</a></li>

                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</header>

<!-- Main content -->
<main class="container">
    <h1 class="text-center my-4">Events page</h1>

    <div class="d-flex align-items-center justify-content-between my-3">
        <h4 id="month"></h4>
        <select id="category" class="form-select w-25" aria-label="Select category">
            <option selected>Select a category</option>
            <option value="cleanup">Cleanups</option>
            <option value="workshop">Workshops</option>
            <option value="fundraiser">Fundraisers</option>
        </select>
        <div>
            <button id="prevMonthButton" style="width: 40px; height: 40px" class="btn btn-outline-secondary rounded-pill me-4">
                <i class="fa-solid fa-chevron-left"></i>
            </button>
            <button id="thisMonthButton" class="btn btn-primary me-4">Today</button>
            <button id="nextMonthButton" style="width: 40px; height: 40px" class="btn btn-outline-secondary rounded-pill">
                <i class="fa-solid fa-chevron-right"></i>
            </button>
        </div>
    </div>
    <table class="table table-striped table-bordered table-hover">
        <thead class="table-dark">
        <tr>
            <th scope="col" class="text-center">Sunday</th>
            <th scope="col" class="text-center">Monday</th>
            <th scope="col" class="text-center">Tuesday</th>
            <th scope="col" class="text-center">Wednesday</th>
            <th scope="col" class="text-center">Thursday</th>
            <th scope="col" class="text-center">Friday</th>
            <th scope="col" class="text-center">Saturday</th>
        </tr>

        </thead>
        <tbody id="calendarBody"></tbody>
    </table>
</main>

<!--Scripting Section-->
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"

        crossorigin="anonymous"></script>
<script src="./node_modules/bootstrap/dist/js/bootstrap.js"></script>
<script src="scripts/main.js"></script>

</body>
</html>
